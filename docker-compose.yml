version: "3.9"
services:
  oto-torch-trace:
    build: .
    container_name: oto-torch-trace
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:80"
    environment:
      - TZ=${TZ:-America/Los_Angeles}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

